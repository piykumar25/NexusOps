global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "nexusops-api"
    # Assume FastAPI exposes metrics via /metrics if instrumented, or we scrape cAdvisor
    # For now, just a placeholder for the API server
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:8082"]
